name: Lazarus AI PR Agent Webhook

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  notify-lazarus:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Send PR Event to Lazarus (with HMAC)
        env:
          GITHUB_WEBHOOK_SECRET: ${{ secrets.LAZARUS_WEBHOOK_SECRET }}
          PAYLOAD: '{"action": "${{ github.event.action }}", "repository": {"full_name": "${{ github.repository }}"}, "pull_request": {"number": ${{ github.event.pull_request.number }} }}'
        run: |
          # Compute HMAC-SHA256 signature
          SIGNATURE=$(python3 -c "import hmac, hashlib, os; print('sha256=' + hmac.new(os.environ['GITHUB_WEBHOOK_SECRET'].encode(), os.environ['PAYLOAD'].encode(), hashlib.sha256).hexdigest())")
          
          # Send to Lazarus over Tailscale
          curl -X POST http://100.114.41.52:8081/github-webhook \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: $SIGNATURE" \
          -H "X-GitHub-Event: pull_request" \
          -d "$PAYLOAD"
